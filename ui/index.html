<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <title>tiny11options</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="breadcrumb">
        <span data-step="source"    class="active">1. Source</span>
        <span data-step="customize">2. Customize</span>
        <span data-step="build">3. Build</span>
        <button id="update-badge" type="button" class="update-badge hidden" title="Update available — click to install" aria-label="Update available"></button>
        <button id="theme-toggle" type="button" class="theme-toggle" title="Switch theme" aria-label="Switch theme"></button>
    </header>
    <main id="content"></main>
    <footer class="actions">
        <button id="back-btn" disabled>&lt; Back</button>
        <button id="next-btn" disabled>Next &gt;</button>
    </footer>
    <script src="app.js"></script>
</body>
</html>
