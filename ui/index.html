<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <title>tiny11options</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="breadcrumb" aria-label="Wizard progress">
        <button type="button" data-step="source"    class="crumb-btn active">1. Source</button>
        <button type="button" data-step="customize" class="crumb-btn">2. Customize</button>
        <button type="button" data-step="build"     class="crumb-btn">3. Build</button>
        <button id="update-badge" type="button" class="update-badge hidden" title="Update available, click to install..." data-tooltip="Update available, click to install..." aria-label="Update available, click to install"></button>
        <button id="theme-toggle" type="button" class="theme-toggle" title="Switch theme" aria-label="Switch theme"></button>
    </nav>
    <span id="forward-nav-gate-reason" class="visually-hidden">Fill in all required Source &amp; paths fields first.</span>
    <main id="content"></main>
    <footer class="actions">
        <!-- v1.0.8 audit WARNING ui B8: aria-label on a span without role OVERRIDES
             textContent for screen readers; v1.0.7 added the label and accidentally
             hid the version number from assistive tech. title= provides tooltip for
             sighted users without the override; screen readers read textContent. -->
        <span class="app-version" id="app-version" title="Application version"></span>
        <button id="back-btn" disabled>&lt; Back</button>
        <button id="next-btn" type="button" disabled aria-describedby="forward-nav-gate-reason">Next &gt;</button>
    </footer>
    <!-- v1.0.8 audit WARNING ui B9: in-app confirm modal replaces window.confirm
         which paused the WebView2 message pump for the modal's lifetime.
         Hidden by default; shown by app.js's showUpdateConfirmModal(). -->
    <div id="update-confirm-modal" class="modal-overlay" hidden role="dialog" aria-modal="true" aria-labelledby="update-confirm-title">
        <div class="modal-content">
            <h2 id="update-confirm-title">Install tiny11options update?</h2>
            <p id="update-confirm-version" class="modal-version"></p>
            <pre id="update-confirm-notes" class="modal-notes"></pre>
            <div class="modal-actions">
                <button id="update-confirm-cancel" type="button">Cancel</button>
                <button id="update-confirm-install" type="button" class="primary">Install</button>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
