# CI: build + test on every push to main and every PR targeting main.
#
# This workflow enables the `required_status_checks` rule on the main branch
# ruleset (rule references the `build-and-test` job context). Without this
# workflow existing and running, the rule would block ALL pushes to main
# because the required check would never report.
#
# All actions are pinned to commit SHAs per the repo-level
# `sha_pinning_required` enforcement. Trailing `# vX.Y.Z` comments preserve
# human-readable version context. Dependabot (`.github/dependabot.yml`,
# `package-ecosystem: github-actions`) PRs SHA bumps as upstream actions tag
# new versions.
#
# Image: windows-2025-vs2026 matches release.yml so CI exercises the same
# .NET 10 SDK + Pester + WebView2 surface that ships.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: windows-2025-vs2026
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore tiny11options.sln

      - name: Build
        run: dotnet build tiny11options.sln -c Release --no-restore

      - name: Test (xUnit)
        run: dotnet test launcher/Tests/tiny11options.Launcher.Tests.csproj -c Release --no-build --logger "trx;LogFileName=test-results.trx"

      - name: Test (Pester)
        shell: pwsh
        run: pwsh -NoProfile -File tests/Run-Tests.ps1

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-results
          path: '**/test-results.trx'
